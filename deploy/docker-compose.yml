# docker-compose.yml — liegt auf dem VPS unter /opt/nook/docker-compose.yml
#
# Image kommt aus GHCR (gebaut vom GitHub-Actions-Workflow).
# Auf dem VPS: .env mit POSTGRES_PASSWORD (siehe .env.example).
#
# Reverse-Proxy (Caddy) läuft zentral im /opt/ambardaellen/-Stack und
# proxiet nook.al-daellen.ch → nook-app:3000 über das externe
# Docker-Netzwerk `proxy`.

services:
  db:
    image: postgres:16-alpine
    container_name: nook-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nook}
      POSTGRES_USER: ${POSTGRES_USER:-nook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nook} -d ${POSTGRES_DB:-nook}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  app:
    image: ghcr.io/ambarconca-png/nook:latest
    container_name: nook-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgres://${POSTGRES_USER:-nook}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-nook}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - proxy

networks:
  internal:
    driver: bridge
  proxy:
    external: true

volumes:
  db-data:
