name: Build & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          NOOK_ADMIN_EMAIL: ${{ secrets.NOOK_ADMIN_EMAIL }}
          NOOK_ADMIN_PASSWORD: ${{ secrets.NOOK_ADMIN_PASSWORD }}
          NOOK_ADMIN_NAME: Ambar
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: NOOK_ADMIN_EMAIL,NOOK_ADMIN_PASSWORD,NOOK_ADMIN_NAME
          script: |
            set -euo pipefail
            cd /opt/nook
            umask 077
            touch .env
            grep -vE '^(NOOK_ADMIN_EMAIL|NOOK_ADMIN_PASSWORD|NOOK_ADMIN_NAME)=' .env > .env.next || true
            printf 'NOOK_ADMIN_EMAIL=%s\n' "$NOOK_ADMIN_EMAIL" >> .env.next
            printf 'NOOK_ADMIN_PASSWORD=%s\n' "$NOOK_ADMIN_PASSWORD" >> .env.next
            printf 'NOOK_ADMIN_NAME=%s\n' "$NOOK_ADMIN_NAME" >> .env.next
            mv .env.next .env
            docker compose pull
            docker compose up -d
            docker image prune -f
            echo "Deployed at $(date -Iseconds)"
            docker compose ps
